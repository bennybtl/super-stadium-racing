<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offroad</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; }
      canvas { display: block; width: 100vw; height: 100vh; }
      
      #debug-panel {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: #0f0;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        padding: 10px;
        border: 1px solid #0f0;
        min-width: 250px;
        pointer-events: none;
      }
      
      #debug-panel .row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 2px;
      }
      
      #debug-panel .label {
        color: #888;
      }
      
      #debug-panel .value {
        color: #0f0;
        text-align: right;
      }
      
      #checkpoint-display {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: #ff0;
        font-family: 'Courier New', monospace;
        font-size: 24px;
        font-weight: bold;
        padding: 15px 25px;
        border: 2px solid #ff0;
        pointer-events: none;
      }
      
      #lap-display {
        position: absolute;
        top: 80px;
        right: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: #0ff;
        font-family: 'Courier New', monospace;
        font-size: 28px;
        font-weight: bold;
        padding: 15px 25px;
        border: 2px solid #0ff;
        pointer-events: none;
      }
      
      #boost-display {
        position: absolute;
        top: 160px;
        right: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: #f80;
        font-family: 'Courier New', monospace;
        font-size: 24px;
        font-weight: bold;
        padding: 15px 25px;
        border: 2px solid #f80;
        pointer-events: none;
      }
      
      #boost-display.active {
        color: #ff0;
        border-color: #ff0;
        box-shadow: 0 0 20px #ff0;
        animation: pulse 0.3s infinite;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="checkpoint-display">Checkpoints: <span id="checkpoint-counter">0</span></div>
    <div id="lap-display">Lap: <span id="lap-counter">0</span></div>
    <div id="boost-display">Nitro: <span id="boost-counter">5</span></div>
    <div id="debug-panel">
      <div class="row"><span class="label">Compression:</span><span class="value" id="debug-compression">-</span></div>
      <div class="row"><span class="label">Groundedness:</span><span class="value" id="debug-groundedness">-</span></div>
      <div class="row"><span class="label">Penetration:</span><span class="value" id="debug-penetration">-</span></div>
      <div class="row"><span class="label">Vert Velocity:</span><span class="value" id="debug-vvel">-</span></div>
      <div class="row"><span class="label">Horiz Speed:</span><span class="value" id="debug-speed">-</span></div>
      <div class="row"><span class="label">Effective Grip:</span><span class="value" id="debug-grip">-</span></div>
      <div class="row"><span class="label">Slip Angle:</span><span class="value" id="debug-slip">-</span></div>
      <div class="row"><span class="label">Terrain:</span><span class="value" id="debug-terrain">-</span></div>
      <div>X: <span id="debug-x">0.00</span></div>
      <div>Y: <span id="debug-y">0.00</span></div>
      <div>Z: <span id="debug-z">0.00</span></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
