  <head>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; }
      canvas { display: block; width: 100vw; height: 100vh; }
      
      #debug-panel {
        display: none;
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: #0f0;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        padding: 10px;
        border: 1px solid #0f0;
        min-width: 250px;
        pointer-events: none;
      }
      
      #debug-panel .row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 2px;
      }
      
      #debug-panel .label {
        color: #888;
      }
      
      #debug-panel .value {
        color: #0f0;
        text-align: right;
      }
      
      #race-timer {
        width: 100%;
        background: rgba(0, 0, 0, 0.8);
        color: #00ff00;
        font-family: 'Courier New', monospace;
        font-size: 24px;
        font-weight: bold;
        padding: 5px 5px;
        display: none;
      }

      #checkpoint-display {
        width: 100%;
        position: relative;
        background: rgba(0, 0, 0, 0.7);
        color: #999999;
        font-family: 'Courier New', monospace;
        font-size: 16px;
        font-weight: bold;
        padding: 5px 5px;
        pointer-events: none;
      }
      
      #lap-display {
        width: 100%;
        position: relative;
        color: #999999;
        font-family: 'Courier New', monospace;
        font-size: 16px;
        font-weight: bold;
        padding: 5px 5px;
        pointer-events: none;
      }
      
      #boost-display {
        width: 100%;
        position: relative;
        background: rgba(0, 0, 0, 0.7);
        color: #999999;
        font-family: 'Courier New', monospace;
        font-size: 16px;
        font-weight: bold;
        padding: 5px 5px;
        pointer-events: none;
      }
      
      #boost-display.active {
        color: #ff0;
        border-color: #ff0;
        box-shadow: 0 0 20px #ff0;
        animation: pulse 0.3s infinite;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }

      #race-status-panel {
        position: absolute;
        bottom: 10px;
        right: 10px;
        display: none;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
        background: rgba(0, 0, 0, 0.7);
      }

      #countdown-overlay {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      #countdown-text {
        font-size: 20vw;
        font-family: 'Arial Black', Arial, sans-serif;
        font-weight: 900;
        color: #fff;
        text-shadow: 0 0 80px rgba(255, 200, 0, 0.7), 6px 6px 0 rgba(0, 0, 0, 0.8);
        line-height: 1;
        -moz-user-select: none;
